spring:
  application:
    name: assetflow-api
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/assetflow_db
    username: ${DB_USERNAME:assetflow_user}
    password: ${DB_PASSWORD:assetflow_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false
    clean-on-validation-error: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@assetflow.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  cache:
    type: simple

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiration: 3600000      # 1 hour in ms
    refresh-token-expiration: 604800000   # 7 days in ms
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    base-url: ${BASE_URL:http://localhost:8080}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  email:
    from: ${MAIL_FROM:noreply@assetflow.com}
    from-name: "AssetFlow System"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
  default-produces-media-type: application/json

logging:
  level:
    com.assetflow: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
