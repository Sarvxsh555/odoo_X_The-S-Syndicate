version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assetflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assetflow_db
      POSTGRES_USER: assetflow_user
      POSTGRES_PASSWORD: assetflow_pass
    ports:
      - "5432:5432"
    volumes:
      - assetflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow_user -d assetflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: assetflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@assetflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - assetflow_pgadmin_data:/var/lib/pgadmin

volumes:
  assetflow_postgres_data:
  assetflow_pgadmin_data:
